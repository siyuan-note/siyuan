<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <style>
        html {
            overflow: hidden;
            height: 100%;
        }

        body {
            height: 100%;
            margin: 0;
            background: #1e1e1e;
            font-size: 12px;
            font-family: "Helvetica Neue", "Luxi Sans", "DejaVu Sans", "Hiragino Sans GB", "Microsoft Yahei", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Android Emoji", "EmojiSymbols";
        }
    </style>
</head>
<body>
<div id="bg" style="width: 100%;display: flex;justify-content: space-around;height: 100%;">
    <img style="width:36vh;align-self: center;" src="icon.png"/>
</div>
<div style="position: absolute;bottom: 0;width: 100%;">
    <div style="position: absolute;height: 1px;background-color: #3b3e43;width: 100%;top:0"></div>
    <div id="progress"
         style="position: absolute;height: 1px;background-color: #d23f31;transition: width 50ms cubic-bezier(0, 0, 0.2, 1);top:0"></div>
    <div id="details"
         style="color: #9aa0a6;text-overflow: ellipsis;white-space: nowrap;overflow: hidden;padding: 8px;"></div>
</div>
<script>
    const getSearch = (key) => {
        if (window.location.search.indexOf('?') === -1) {
            return ''
        }
        let value = ''
        const data = window.location.search.split('?')[1].split('&')
        data.find(item => {
            const keyValue = item.split('=')
            if (keyValue[0] === key) {
                value = keyValue[1]
                return true
            }
        })
        return value
    }

    const redirect = () => {
        const uri = 'http://127.0.0.1:' + location.port
        window.location.replace(uri)
    }
    (async () => {
        const v = getSearch('v')
        document.getElementById('details').textContent = "v" + v + ' Booting kernel...'
        let progressing = false
        const subscribe = () => {
            const es = new EventSource('http://127.0.0.1:' + location.port + '/api/system/bootProgressSSE')
            es.onmessage = (event) => {
                const progressData = JSON.parse(event.data)
                document.getElementById('progress').style.width = progressData.progress + '%'
                document.getElementById('details').textContent = progressData.details
                if (progressData.progress >= 100) {
                    progressing = true
                    es.close()
                    if (navigator.userAgent.indexOf('Electron') === -1) {
                        redirect()
                    }
                }
            }
            es.onerror = () => {
                es.close()
                // 内核启动早期 HTTP 服务可能尚未就绪，EventSource 原生重连间隔较长（约 3s），
                // 这里主动短延迟重连，保持与原轮询一致的快速重试语义
                if (!progressing) {
                    setTimeout(subscribe, 100)
                }
            }
        }
        subscribe()
    })()
</script>
</body>
</html>
