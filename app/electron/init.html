<!DOCTYPE html>
<html>
<head>
    <title>SiYuan</title>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <style>
        body {
            margin: 0;
            background-color: #fff;
            text-align: center;
            color: #222;
            font-size: 16px;
            font-family: BlinkMacSystemFont, Helvetica, "PingFang SC", "Luxi Sans", "DejaVu Sans", arial, "Microsoft Yahei", "Hiragino Sans GB", "Source Han Sans SC", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Twemoji Mozilla", "Android Emoji", "EmojiSymbols";
        }

        .fn__flex-column {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 0 calc((100vw - 608px) * 0.3);
        }

        .fn__flex-1 {
            flex: 1;
            min-height: 32px;
            flex-shrink: 0;
            min-width: 8px;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 28px;
        }

        .b3-select {
            border-radius: 6px;
            color: #222;
            height: 28px;
            width: 96px;
            border: 0;
            padding: 4px 26px 4px 8px;
            box-sizing: border-box;
            line-height: 20px;
            transition: box-shadow 120ms 0ms cubic-bezier(0, 0, 0.2, 1), background-color 0.2s cubic-bezier(0, 0, 0.2, 1) 0ms;
            font-size: 14px;
            box-shadow: inset 0 0 0 0.6px #5f6368;
            background: url("data:image/svg+xml;utf8,<svg fill='rgba(95, 99, 104, .68)' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 2px center #fff;
            appearance: none;
            cursor: pointer;
            overflow: hidden;
        }

        .b3-select:focus {
            box-shadow: inset 0 0 0 1px #3575f0, 0 0 0 3px rgba(53, 117, 240, .12);
        }

        .b3-button {
            cursor: pointer;
            color: #fff;
            border-radius: 6px;
            line-height: 20px;
            padding: 4px 8px;
            background-color: #3575f0;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 280ms ease;
            border: 0;
            box-sizing: border-box;
            text-align: center;
            width: 96px;
        }

        .b3-button:hover, .b3-button:focus {
            text-decoration: none;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / .3), 0 1px 3px 1px rgb(0 0 0 /.15);
        }

        .b3-button:active {
            box-shadow: 0 2px 3px 1px rgb(0 0 0 / .3), 0 2px 4px 2px rgb(0 0 0 /.15);
        }

        .b3-label {
            padding: 16px 24px 0;
            margin-bottom: 16px;
            display: flex;
            text-align: left;
            box-shadow: 0 15px 0 0 #fff, 0 16px 0 0 #e0e0e0;
        }

        .b3-label__text {
            color: #5f6368;
            font-size: 14px;
            margin-top: 4px;
            overflow: hidden;
            line-height: 1.65;
        }

        .fn__flex-center {
            align-self: center;
        }

        .svg {
            position: fixed;
            right: 32px;
            top: 0;
            width: 13px;
            fill: #5f6368;
            padding: 9.5px;
            cursor: pointer;
            z-index: 1;
        }

        .svg:hover {
            background: #dfe0e1;
            fill: #222;
        }

        #close {
            right: 0;
            width: 10px;
            padding: 11px 11px;
        }

        #close:hover {
            background-color: #d23f31;
            fill: #fff;
        }

        a {
            text-decoration: none;
            color: #3575f0;
        }

        a:hover {
            text-decoration: underline;
        }

        .fn__none {
            display: none !important;
        }

        .slogan {
            color: #5f6368;
            font-size: 15px;
        }

        .notice {
            font-size: 14px;
            color: #5f6368;
        }

        .icon {
            width: 96px;
            margin: 0 auto 16px;
        }

        kbd {
            font: 75% SFMono-Regular, Consolas, "Liberation Mono";
            line-height: 1;
            border-radius: 6px;
            padding: 2px 4px;
            color: #5f6368;
            vertical-align: middle;
            background-color: #f6f6f6;
            border: solid 1px #e0e0e0;
            box-shadow: inset 0 -1px 0 #e0e0e0;
        }

        .feedback {
            display: flex;
            justify-content: space-around;
            font-size: 14px
        }

        .drag {
            -webkit-app-region: drag;
            height: 32px;
            cursor: pointer;
            position: fixed;
            top: 0;
            left: 0;
            right: 64px;
        }

        .darwin #min,
        .darwin #close {
            display: none;
        }

        .darwin .drag {
            right: 0;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1e1e1e;
                color: #dadada;
            }

            .b3-select {
                color: #dadada;
                box-shadow: inset 0 0 0 0.6px #9aa0a6;
                background: url("data:image/svg+xml;utf8,<svg fill='rgba(154, 160, 166, .68)' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 2px center #1e1e1e;
            }

            .b3-select:focus {
                box-shadow: inset 0 0 0 1px #3573f0, 0 0 0 3px rgba(53, 115, 240, .24);
            }

            .b3-button {
                background-color: #3573f0;
            }

            .b3-button:hover, .b3-button:focus {
                box-shadow: 0 1px 2px 0 rgb(0 0 0 / .3), 0 1px 3px 1px rgb(255 255 255 /.15);
            }

            .b3-button:active {
                box-shadow: 0 2px 3px 1px rgb(0 0 0 / .3), 0 2px 4px 2px rgb(255 255 255 /.15);
            }

            .b3-label {
                box-shadow: 0 15px 0 0 #1e1e1e, 0 16px 0 0 #363636;
            }

            .b3-label__text {
                color: #9aa0a6;
            }

            .svg {
                fill: #9aa0a6;
            }

            .svg:hover {
                background: rgba(255, 255, 255, .075);
                fill: #dadada;
            }

            a {
                color: #3573f0;
            }

            .slogan {
                color: #9aa0a6;
            }

            .notice {
                color: #9aa0a6;
            }

            kbd {
                color: #9aa0a6;
                background-color: #262626;
                border: solid 1px rgba(230, 230, 230, .06);
                box-shadow: inset 0 -1px 0 rgba(230, 230, 230, .06);
            }
        }
    </style>
</head>
<body>

    </div>
    <div class="fn__flex-1"></div>
</div>

    <img class="icon">

<svg class="svg" id="min" viewBox="0 0 32 32">
    <path d="M1.333 14.667h29.333q1.333 0 1.333 1.333v0q0 1.333-1.333 1.333h-29.333q-1.333 0-1.333-1.333v0q0-1.333 1.333-1.333z"></path>
</svg>
<svg class="svg" id="close" viewBox="0 0 32 32">
    <path d="M32 3.221l-12.779 12.779 12.779 12.779-3.221 3.221-12.779-12.779-12.779 12.779-3.221-3.221 12.779-12.779-12.779-12.779 3.221-3.221 12.779 12.779 12.779-12.779z"></path>
</svg>
<div class="drag"></div>
<script>
    const isChinese = (lang) => {
        return 'zh_CN' === lang || 'zh_CHT' === lang
    }

    const getSearch = (key) => {
        if (window.location.search.indexOf('?') === -1) {
            return ''
        }
        let value = ''
        const data = window.location.search.split('?')[1].split('&')
        data.find(item => {
            const keyValue = item.split('=')
            if (keyValue[0] === key) {
                value = keyValue[1]
                return true
            }
        })
        return value
    }

    let currentLang = decodeURIComponent(getSearch('lang'))
    const setLang = (lang) => {
        if (isChinese(lang)) {
            document.title = `思源笔记 v${getSearch('v')}`
            document.getElementById('zhCN').classList.remove('fn__none')
            document.getElementById('enUS').classList.add('fn__none')
        } else {
            document.title = `SiYuan v${getSearch('v')}`
            document.getElementById('zhCN').classList.add('fn__none')
            document.getElementById('enUS').classList.remove('fn__none')
        }
        currentLang = lang
    }
    setLang(currentLang)

    document.querySelectorAll('.version').forEach(item => {
        item.textContent = `v${getSearch('v')}`
    })

    document.querySelectorAll('.icon').forEach(item => {
        item.src = decodeURIComponent(`${getSearch('icon')}`)
    })

    document.querySelectorAll('.lang').forEach(item => {
        item.value = currentLang
        item.addEventListener('change', () => {
            document.querySelectorAll('.lang').forEach(item1 => {
                item1.value = item.value
            })
            setLang(item.value)
        })
    })

    if (process.platform === 'darwin') {
        document.body.classList.add('darwin');
    }

    document.getElementById('close').addEventListener('click', () => {
        const {ipcRenderer} = require('electron')
        ipcRenderer.send('siyuan-first-quit')
    })
    document.getElementById('min').addEventListener('click', () => {
        const {ipcRenderer} = require('electron')
        ipcRenderer.send("siyuan-cmd", "minimize");
    })

    document.querySelectorAll('.choosePath').forEach((item) => {
        item.addEventListener('click', async () => {
            const path = require('path')
            const fs = require('fs')

            let defaultWorkspace = path.join(decodeURIComponent(getSearch('home')), "SiYuan")
            if ("darwin" === process.platform) {
                // Change the initial workspace path to ~/Library/Application Support/SiYuan on macOS https://github.com/siyuan-note/siyuan/issues/17095
                defaultWorkspace = path.join(decodeURIComponent(getSearch('home')), "Library", "Application Support", "SiYuan")
            }
            if (!fs.existsSync(defaultWorkspace)) {
                fs.mkdirSync(defaultWorkspace, {mode: 0o755, recursive: true})
            }

            const {ipcRenderer} = require('electron')
            const result = await ipcRenderer.invoke("siyuan-get", {
                cmd: "showOpenDialog",
                defaultPath: defaultWorkspace,
                properties: ['openDirectory', 'createDirectory'],
            });

            if (result.canceled) {
                return
            }
            const initPath = result.filePaths[0]

            if (isPartitionRootPath(initPath)) {
                let msg = '⚠️ Do not create the workspace in the partition root path, please create a new folder as the workspace'
                if (isChinese(currentLang)) {
                    msg = '⚠️ 请勿在分区根路径上创建工作空间，请新建一个文件夹作为工作空间'
                }
                alert(msg)
                return
            }

            if (!isWorkspaceDir(initPath) && !isEmptyDir(initPath)) {
                let msg = '⚠️ This folder contains other files, please create a new folder as the workspace'
                if (isChinese(currentLang)) {
                    msg = '⚠️ 该文件夹包含了其他文件，请新建一个文件夹作为工作空间'
                }
                alert(msg)
                return
            }

            if (isICloudPath(initPath)) {
                let msg = '⚠️ This folder is under the iCloud sync path, please change another path'
                if (isChinese(currentLang)) {
                    msg = '⚠️ 该文件夹位于 iCloud 同步路径下，请更换其他路径'
                }
                alert(msg)
                return
            }

            if (isCloudDrivePath(initPath)) {
                let msg = '⚠️ The folder path can not contain onedrive, dropbox, google drive, pcloud and 坚果云, please change another path'
                if (isChinese(currentLang)) {
                    msg = '⚠️ 文件夹路径不能包含 onedrive、dropbox、google drive、pcloud 和 坚果云，请更换其他路径'
                }
                alert(msg)
                return
            }
            let msg = '⚠️ Please confirm that the workspace is not set under the path of a third-party sync disk, otherwise it will cause data damage (iCloud/OneDrive/Dropbox/Google Drive/Nutstore/Baidu Netdisk/Tencent Weiyun, etc.), continue?'
            if (isChinese(currentLang)) {
                msg = '⚠️ 请确认没有将工作空间设置在第三方同步盘路径下，否则会造成数据损坏（iCloud/OneDrive/Dropbox/Google Drive/坚果云/百度网盘/腾讯微云等），是否继续？'
            }
            if (!confirm(msg)) {
                return
            }
            if (!fs.existsSync(initPath)) {
                fs.mkdirSync(initPath, {mode: 0o755, recursive: true})
            }
            ipcRenderer.send('siyuan-first-init', {
                workspace: initPath,
                lang: document.querySelector('.lang').value
            })
        })
    })

    const isPartitionRootPath = (absPath) => {
        const path = require('path')
        const parsedPath = path.parse(absPath)
        return parsedPath.root === absPath
    }

    const isEmptyDir = (absPath) => {
        const fs = require('fs')
        let files;
        try {
            files = fs.readdirSync(absPath).filter(file => file !== '.DS_Store')
        } catch (err) {
            return false
        }
        return 0 === files.length
    }

    const isWorkspaceDir = (absPath) => {
        const path = require('path');
        const fs = require('fs');
        const conf = path.join(absPath, 'conf', 'conf.json');
        let data;
        try {
            data = fs.readFileSync(conf, 'utf8');
        } catch (err) {
            return false;
        }
        return data.includes('kernelVersion');
    }

    const isCloudDrivePath = (absPath) => {
        const absPathLower = absPath.toLowerCase()
        return -1 < absPathLower.indexOf("onedrive") || -1 < absPathLower.indexOf("dropbox") ||
            -1 < absPathLower.indexOf("google drive") || -1 < absPathLower.indexOf("pcloud") ||
            -1 < absPathLower.indexOf("坚果云")
    }

    const isICloudPath = (absPath) => {
        const os = require('os')
        if ('darwin' !== os.platform()) {
            return false
        }

        // macOS 端对工作空间放置在 iCloud 路径下做检查 https://github.com/siyuan-note/siyuan/issues/7747
        const path = require('path')
        const homePath = decodeURIComponent(getSearch('home'))
        const absPathLower = absPath.toLowerCase()
        const iCloudRoot = path.join(homePath, 'Library', 'Mobile Documents')
        if (!simpleCheckIcloudPath(absPath, homePath)) {
            // 简单判断无法通过则复杂验证
            const allFiles = walk(iCloudRoot)
            for (const file of allFiles) {
                if (-1 < absPathLower.indexOf(file.toLowerCase())) {
                    return true
                }
            }
        }
        return false
    }

    // 简单判断 iCloud 同步目录
    // 不允许 为桌面 文档 和 iCloud 文件夹 和软链接
    const simpleCheckIcloudPath = (absPath, homePath) => {
        const fs = require('fs')
        let stat = fs.lstatSync(absPath)
        if (stat.isSymbolicLink()) {
            return false
        }

        const path = require('path')
        const absPathLower = absPath.toLowerCase()
        const iCloudRoot = path.join(homePath, 'Library', 'Mobile Documents')
        if (absPathLower.startsWith(iCloudRoot.toLowerCase())) {
            return false
        }

        const documentsRoot = path.join(homePath, 'Documents')
        if (absPathLower.startsWith(documentsRoot.toLowerCase())) {
            return false
        }

        const desktopRoot = path.join(homePath, 'Desktop')
        if (absPathLower.startsWith(desktopRoot.toLowerCase())) {
            return false
        }
        return true
    }

    const walk = (dir, files = []) => {
        let dirFiles;
        const fs = require('fs')
        try {
            if (!fs.existsSync(dir)) {
                console.log("dir [" + dir + "] not exists")
                return files
            }
            dirFiles = fs.readdirSync(dir)
        } catch (e) {
            console.error("read dir [" + dir + "] failed: ", e)
            return files
        }

        const path = require('path')
        for (const f of dirFiles) {
            let stat = fs.lstatSync(dir + path.sep + f)
            if (stat.isSymbolicLink()) {
                files.push(fs.readlinkSync(dir + path.sep + f))
                continue
            }
            if (stat.isDirectory()) {
                // 如果已经遍历过则不再遍历
                if (files.includes(dir + path.sep + f)) {
                    continue
                }
                files.push(dir + path.sep + f)
                walk(dir + path.sep + f, files)
            }
        }
        return files
    }

</script>
