<!DOCTYPE html>
<html>
<head>
    <title>SiYuan</title>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <style>
        body {
            margin: 0;
            background-color: #fff;
            text-align: center;
            color: #222;
            font-size: 16px;
            font-family: BlinkMacSystemFont, Helvetica, "PingFang SC", "Luxi Sans", "DejaVu Sans", arial, "Microsoft Yahei", "Hiragino Sans GB", "Source Han Sans SC", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Twemoji Mozilla", "Android Emoji", "EmojiSymbols";
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .wsPanel {
            flex: none;
            width: 300px;
            border-right: 1px solid #e0e0e0;
            padding: 24px;
            overflow-y: auto;
            text-align: left;
            box-sizing: border-box;
            background-color: #f6f6f6;
        }

        .wsTitle {
            font-size: 16px;
            font-weight: bold;
            color: rgba(0, 0, 0, .6);
            margin-bottom: 16px;
        }

        .ws-item {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 6px;
            cursor: default;
        }

        .ws-item:hover {
            background: #dfe0e1;
        }

        .ws-text {
            flex: 1;
            min-width: 0;
        }

        .ws-name {
            font-size: 16px;
            color: #222;
            line-height: 1.5;
        }

        .ws-path {
            font-size: 12px;
            color: rgba(0, 0, 0, .6);
            word-break: break-all;
            line-height: 1.5;
        }

        .fn__flex-column {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 0 calc((100vw - 608px) * 0.3);
        }

        .right {
            flex: 1;
            padding: 0 32px;
        }

        .fn__flex-1 {
            flex: 1;
            min-height: 32px;
            flex-shrink: 0;
            min-width: 8px;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 28px;
        }

        .b3-select {
            border-radius: 6px;
            color: #222;
            height: 28px;
            width: 96px;
            border: 0;
            padding: 4px 26px 4px 8px;
            box-sizing: border-box;
            line-height: 20px;
            transition: box-shadow 120ms 0ms cubic-bezier(0, 0, 0.2, 1), background-color 0.2s cubic-bezier(0, 0, 0.2, 1) 0ms;
            font-size: 14px;
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .6);
            background: url("data:image/svg+xml;utf8,<svg fill='rgba(0, 0, 0, .4)' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 2px center #fff;
            appearance: none;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
        }

        .b3-select:focus {
            box-shadow: inset 0 0 0 1px #3575f0, 0 0 0 3px rgba(53, 117, 240, .12);
        }

        .b3-button {
            cursor: pointer;
            color: #fff;
            border-radius: 6px;
            line-height: 20px;
            padding: 4px 8px;
            background-color: #3575f0;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 280ms ease;
            border: 0;
            box-sizing: border-box;
            text-align: center;
            width: 96px;
            flex-shrink: 0;
        }

        .b3-button:hover, .b3-button:focus {
            text-decoration: none;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / .3), 0 1px 3px 1px rgb(0 0 0 /.15);
        }

        .b3-button:active {
            box-shadow: 0 2px 3px 1px rgb(0 0 0 / .3), 0 2px 4px 2px rgb(0 0 0 /.15);
        }

        .ws-open {
            width: auto;
            padding: 2px 12px;
            color: rgba(0, 0, 0, .6);
            background-color: transparent;
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 120ms ease;
        }

        .ws-item:hover .ws-open {
            opacity: 1;
            pointer-events: auto;
        }

        .ws-open:hover, .ws-open:focus {
            color: #222;
            background-color: rgba(0, 0, 0, .06);
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .4);
        }

        .ws-open:active {
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .4);
        }

        .b3-label {
            padding: 16px 24px 0;
            margin-bottom: 16px;
            display: flex;
            text-align: left;
            box-shadow: 0 15px 0 0 #fff, 0 16px 0 0 #e0e0e0;
        }

        .b3-label__text {
            color: rgba(0, 0, 0, .6);
            font-size: 14px;
            margin-top: 4px;
            overflow: hidden;
            line-height: 1.65;
        }

        .fn__flex-center {
            align-self: center;
        }

        .svg {
            position: fixed;
            right: 32px;
            top: 0;
            width: 13px;
            fill: rgba(0, 0, 0, .6);
            padding: 9.5px;
            cursor: pointer;
            z-index: 1;
        }

        .svg:hover {
            background: #dfe0e1;
            fill: #222;
        }

        #close {
            right: 0;
            width: 10px;
            padding: 11px 11px;
        }

        #close:hover {
            background-color: #d23f31;
            fill: #fff;
        }

        a {
            text-decoration: none;
            color: #3575f0;
        }

        a:hover {
            text-decoration: underline;
        }

        .fn__none {
            display: none !important;
        }

        .slogan {
            color: rgba(0, 0, 0, .6);
            font-size: 15px;
        }

        .notice {
            font-size: 14px;
            color: rgba(0, 0, 0, .6);
            text-align: center;
        }

        .missing-tip {
            font-size: 18px;
            color: #222;
            text-align: left;
            padding: 0 24px;
            line-height: 1.6;
        }

        .missing-path {
            font-size: 14px;
            color: rgba(0, 0, 0, .6);
            margin-top: 8px;
            word-break: break-all;
        }

        code {
            word-break: break-all;
        }

        kbd {
            font: 75% SFMono-Regular, Consolas, "Liberation Mono";
            line-height: 1;
            border-radius: 6px;
            padding: 2px 4px;
            color: rgba(0, 0, 0, .6);
            vertical-align: middle;
            background-color: #f6f6f6;
            border: solid 1px #e0e0e0;
            box-shadow: inset 0 -1px 0 #e0e0e0;
        }

        .icon {
            width: 96px;
            margin: 0 auto 16px;
        }

        .feedback {
            display: flex;
            justify-content: space-around;
            font-size: 14px
        }

        .drag {
            -webkit-app-region: drag;
            height: 32px;
            cursor: pointer;
            position: fixed;
            top: 0;
            left: 0;
            right: 64px;
        }

        .darwin #min,
        .darwin #close {
            display: none;
        }

        .darwin .drag {
            right: 0;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1e1e1e;
                color: #dadada;
            }

            .wsPanel {
                background-color: #2c2c2c;
                border-right: 1px solid #363636;
            }

            .wsTitle {
                color: #9aa0a6;
            }

            .ws-item:hover {
                background: rgba(255, 255, 255, .075);
            }

            .ws-name {
                color: #dadada;
            }

            .ws-path {
                color: #9aa0a6;
            }

            .b3-button {
                background-color: #3573f0;
            }

            .b3-button:hover, .b3-button:focus {
                box-shadow: 0 1px 2px 0 rgb(0 0 0 / .3), 0 1px 3px 1px rgb(255 255 255 /.15);
            }

            .b3-button:active {
                box-shadow: 0 2px 3px 1px rgb(0 0 0 / .3), 0 2px 4px 2px rgb(255 255 255 /.15);
            }

            .ws-open {
                color: #9aa0a6;
                background-color: transparent;
                box-shadow: inset 0 0 0 0.6px rgba(255, 255, 255, .25);
            }

            .ws-open:hover, .ws-open:focus {
                color: #dadada;
                background-color: rgba(255, 255, 255, .075);
                box-shadow: inset 0 0 0 0.6px rgba(255, 255, 255, .4);
            }

            .ws-open:active {
                box-shadow: inset 0 0 0 0.6px rgba(255, 255, 255, .4);
            }

            .b3-select {
                color: #dadada;
                box-shadow: inset 0 0 0 0.6px #9aa0a6;
                background: url("data:image/svg+xml;utf8,<svg fill='rgba(154, 160, 166, .68)' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 2px center #1e1e1e;
            }

            .b3-select:focus {
                box-shadow: inset 0 0 0 1px #3573f0, 0 0 0 3px rgba(53, 115, 240, .24);
            }

            .b3-label {
                box-shadow: 0 15px 0 0 #1e1e1e, 0 16px 0 0 #363636;
            }

            .b3-label__text {
                color: #9aa0a6;
            }

            .svg {
                fill: #9aa0a6;
            }

            .svg:hover {
                background: rgba(255, 255, 255, .075);
                fill: #dadada;
            }

            a {
                color: #3573f0;
            }

            .slogan {
                color: #9aa0a6;
            }

            .notice {
                color: #9aa0a6;
            }

            .missing-tip {
                color: #dadada;
            }

            .missing-path {
                color: #9aa0a6;
            }

            kbd {
                color: #9aa0a6;
                background-color: #262626;
                border: solid 1px rgba(230, 230, 230, .06);
                box-shadow: inset 0 -1px 0 rgba(230, 230, 230, .06);
            }
        }
    </style>
</head>

    const getSearch = (key) => {
        if (window.location.search.indexOf('?') === -1) {
            return ''
        }
        let value = ''
        const data = window.location.search.split('?')[1].split('&')
        data.find(item => {
            const keyValue = item.split('=')
            if (keyValue[0] === key) {
                value = keyValue[1]
                return true
            }
        })
        return value
    }

    const path = require('path')
    const {ipcRenderer} = require('electron')
    let currentLang = decodeURIComponent(getSearch('lang'))

    // 应用指定语言的文案到 DOM https://github.com/siyuan-note/siyuan/issues/14748
    const applyLang = (lang) => {
        const langData = I18N[lang] || I18N["en"]
        document.title = `${langData.title} v${getSearch('v')}`
        document.querySelectorAll('[data-i18n]').forEach(item => {
            const key = item.getAttribute('data-i18n')
            if (langData[key]) {
                item.textContent = langData[key]
            }
        })
        // 含 HTML 标签（如 <kbd>）的文案用 innerHTML
        document.querySelectorAll('[data-i18n-html]').forEach(item => {
            const key = item.getAttribute('data-i18n-html')
            if (langData[key]) {
                item.innerHTML = langData[key]
            }
        })
        document.querySelectorAll('[data-i18n-href]').forEach(item => {
            const key = item.getAttribute('data-i18n-href')
            if (langData[key]) {
                item.href = langData[key]
            }
        })
        currentLang = lang
    }
    applyLang(currentLang)

    document.querySelector('.version').textContent = `v${getSearch('v')}`
    document.querySelector('.icon').src = decodeURIComponent(`${getSearch('icon')}`)
    document.querySelector('.missing').textContent = decodeURIComponent(getSearch('missing'))

    document.querySelector('.lang').value = currentLang
    document.querySelector('.lang').addEventListener('change', (event) => {
        applyLang(event.target.value)
        // 重新渲染列表项按钮文案
        renderWsList()
    })

    if (process.platform === 'darwin') {
        document.body.classList.add('darwin');
    }

    document.getElementById('close').addEventListener('click', () => {
        ipcRenderer.send('siyuan-first-quit')
    })
    document.getElementById('min').addEventListener('click', () => {
        ipcRenderer.send("siyuan-cmd", "minimize");
    })

    // 渲染可用工作空间列表 https://github.com/siyuan-note/siyuan/issues/14748
    const wsRaw = decodeURIComponent(getSearch('workspaces'))
    const wsList = wsRaw.split('\n').filter(item => '' !== item.trim())
    const renderWsList = () => {
        const langData = I18N[currentLang] || I18N["en"]
        const root = document.querySelector('.wsList')
        root.innerHTML = ''
        wsList.forEach(p => {
            const div = document.createElement('div')
            div.className = 'ws-item'
            const text = document.createElement('div')
            text.className = 'ws-text'
            const name = document.createElement('div')
            name.className = 'ws-name'
            name.textContent = path.basename(p)
            const wsPath = document.createElement('div')
            wsPath.className = 'ws-path'
            wsPath.textContent = p
            text.appendChild(name)
            text.appendChild(wsPath)
            const btn = document.createElement('button')
            btn.className = 'b3-button ws-open'
            btn.textContent = langData.open
            btn.dataset.path = p
            btn.addEventListener('click', () => {
                ipcRenderer.send('siyuan-select-workspace', {
                    workspace: p,
                    lang: currentLang,
                })
            })
            div.appendChild(text)
            div.appendChild(btn)
            root.appendChild(div)
        })
    }
    if (0 < wsList.length) {
        // 存在可用工作空间时渲染左列列表
        renderWsList()
    } else {
        // 没有可用工作空间时隐藏左列，显示右列空提示
        document.querySelector('.wsPanel').classList.add('fn__none')
        document.querySelector('.emptyHint').classList.remove('fn__none')
    }

    document.querySelector('.choosePath').addEventListener('click', async () => {
        const langData = I18N[currentLang] || I18N["en"]
        const fs = require('fs')

        let defaultWorkspace = path.join(decodeURIComponent(getSearch('home')), "SiYuan")
        if ("darwin" === process.platform) {
            // Change the initial workspace path to ~/Library/Application Support/SiYuan on macOS https://github.com/siyuan-note/siyuan/issues/17095
            defaultWorkspace = path.join(decodeURIComponent(getSearch('home')), "Library", "Application Support", "SiYuan")
        }
        if (!fs.existsSync(defaultWorkspace)) {
            fs.mkdirSync(defaultWorkspace, {mode: 0o755, recursive: true})
        }

        const result = await ipcRenderer.invoke("siyuan-get", {
            cmd: "showOpenDialog",
            defaultPath: defaultWorkspace,
            properties: ['openDirectory', 'createDirectory'],
        });

        if (result.canceled) {
            return
        }
        const initPath = result.filePaths[0]

        if (isPartitionRootPath(initPath)) {
            alert(langData.msgPartitionRoot)
            return
        }

        if (!isWorkspaceDir(initPath) && !isEmptyDir(initPath)) {
            alert(langData.msgNotEmpty)
            return
        }

        if (isICloudPath(initPath)) {
            alert(langData.msgICloud)
            return
        }

        if (isCloudDrivePath(initPath)) {
            alert(langData.msgCloudDrive)
            return
        }
        if (!confirm(langData.msgConfirm)) {
            return
        }
        if (!fs.existsSync(initPath)) {
            fs.mkdirSync(initPath, {mode: 0o755, recursive: true})
        }
        ipcRenderer.send('siyuan-select-workspace', {
            workspace: initPath,
            lang: currentLang,
        })
    })

    const isPartitionRootPath = (absPath) => {
        const parsedPath = path.parse(absPath)
        return parsedPath.root === absPath
    }

    const isEmptyDir = (absPath) => {
        const fs = require('fs')
        let files;
        try {
            files = fs.readdirSync(absPath).filter(file => file !== '.DS_Store')
        } catch (err) {
            return false
        }
        return 0 === files.length
    }

    const isWorkspaceDir = (absPath) => {
        const fs = require('fs');
        const conf = path.join(absPath, 'conf', 'conf.json');
        let data;
        try {
            data = fs.readFileSync(conf, 'utf8');
        } catch (err) {
            return false;
        }
        return data.includes('kernelVersion');
    }

    const isCloudDrivePath = (absPath) => {
        const absPathLower = absPath.toLowerCase()
        return -1 < absPathLower.indexOf("onedrive") || -1 < absPathLower.indexOf("dropbox") ||
            -1 < absPathLower.indexOf("google drive") || -1 < absPathLower.indexOf("pcloud") ||
            -1 < absPathLower.indexOf("坚果云") || -1 < absPathLower.indexOf("nutstore") ||
            -1 < absPathLower.indexOf("百度网盘") || -1 < absPathLower.indexOf("baidunetdisk") ||
            -1 < absPathLower.indexOf("腾讯微云") || -1 < absPathLower.indexOf("weiyun");
    }

    const isICloudPath = (absPath) => {
        const os = require('os')
        if ('darwin' !== os.platform()) {
            return false
        }

        // macOS 端对工作空间放置在 iCloud 路径下做检查 https://github.com/siyuan-note/siyuan/issues/7747
        const iCloudRoot = path.join(decodeURIComponent(getSearch('home')), 'Library', 'Mobile Documents')
        const absPathLower = absPath.toLowerCase()
        if (!simpleCheckIcloudPath(absPath)) {
            // 简单判断无法通过则复杂验证
            const allFiles = walk(iCloudRoot)
            for (const file of allFiles) {
                if (-1 < absPathLower.indexOf(file.toLowerCase())) {
                    return true
                }
            }
        }
        return false
    }

    // 简单判断 iCloud 同步目录
    // 不允许 为桌面 文档 和 iCloud 文件夹 和软链接
    const simpleCheckIcloudPath = (absPath) => {
        const fs = require('fs')
        let stat = fs.lstatSync(absPath)
        if (stat.isSymbolicLink()) {
            return false
        }

        const homePath = decodeURIComponent(getSearch('home'))
        const absPathLower = absPath.toLowerCase()
        const iCloudRoot = path.join(homePath, 'Library', 'Mobile Documents')
        if (absPathLower.startsWith(iCloudRoot.toLowerCase())) {
            return false
        }

        const documentsRoot = path.join(homePath, 'Documents')
        if (absPathLower.startsWith(documentsRoot.toLowerCase())) {
            return false
        }

        const desktopRoot = path.join(homePath, 'Desktop')
        if (absPathLower.startsWith(desktopRoot.toLowerCase())) {
            return false
        }
        return true
    }

    const walk = (dir, files = []) => {
        let dirFiles;
        const fs = require('fs')
        try {
            if (!fs.existsSync(dir)) {
                console.log("dir [" + dir + "] not exists")
                return files
            }
            dirFiles = fs.readdirSync(dir)
        } catch (e) {
            console.error("read dir [" + dir + "] failed: ", e)
            return files
        }

        for (const f of dirFiles) {
            let stat = fs.lstatSync(dir + path.sep + f)
            if (stat.isSymbolicLink()) {
                files.push(fs.readlinkSync(dir + path.sep + f))
                continue
            }
            if (stat.isDirectory()) {
                // 如果已经遍历过则不再遍历
                if (files.includes(dir + path.sep + f)) {
                    continue
                }
                files.push(dir + path.sep + f)
                walk(dir + path.sep + f, files)
            }
        }
        return files
    }

</script>
