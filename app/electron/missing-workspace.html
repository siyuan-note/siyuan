<!DOCTYPE html>
<html>
<head>
    <title>SiYuan</title>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <style>
        body {
            margin: 0;
            background-color: #fff;
            text-align: center;
            color: #222;
            font-size: 16px;
            font-family: BlinkMacSystemFont, Helvetica, "PingFang SC", "Luxi Sans", "DejaVu Sans", arial, "Microsoft Yahei", "Hiragino Sans GB", "Source Han Sans SC", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Twemoji Mozilla", "Android Emoji", "EmojiSymbols";
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .wsPanel {
            flex: none;
            width: 300px;
            border-right: 1px solid #e0e0e0;
            padding: 24px;
            overflow-y: auto;
            text-align: left;
            box-sizing: border-box;
            background-color: #f6f6f6;
        }

        .wsTitle {
            font-size: 16px;
            font-weight: bold;
            color: rgba(0, 0, 0, .6);
            margin-bottom: 16px;
        }

        .ws-item {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 6px;
            cursor: default;
        }

        .ws-item:hover {
            background: #dfe0e1;
        }

        .ws-text {
            flex: 1;
            min-width: 0;
        }

        .ws-name {
            font-size: 16px;
            color: #222;
            line-height: 1.5;
        }

        .ws-path {
            font-size: 12px;
            color: rgba(0, 0, 0, .6);
            word-break: break-all;
            line-height: 1.5;
        }

        .fn__flex-column {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 0 calc((100vw - 608px) * 0.3);
        }

        .right {
            flex: 1;
            padding: 0 32px;
        }

        .fn__flex-1 {
            flex: 1;
            min-height: 32px;
            flex-shrink: 0;
            min-width: 8px;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 28px;
        }

        .b3-select {
            border-radius: 6px;
            color: #222;
            height: 28px;
            width: 96px;
            border: 0;
            padding: 4px 26px 4px 8px;
            box-sizing: border-box;
            line-height: 20px;
            transition: box-shadow 120ms 0ms cubic-bezier(0, 0, 0.2, 1), background-color 0.2s cubic-bezier(0, 0, 0.2, 1) 0ms;
            font-size: 14px;
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .6);
            background: url("data:image/svg+xml;utf8,<svg fill='rgba(0, 0, 0, .4)' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 2px center #fff;
            appearance: none;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
        }

        .b3-select:focus {
            box-shadow: inset 0 0 0 1px #3575f0, 0 0 0 3px rgba(53, 117, 240, .12);
        }

        .b3-button {
            cursor: pointer;
            color: #fff;
            border-radius: 6px;
            line-height: 20px;
            padding: 4px 8px;
            background-color: #3575f0;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 280ms ease;
            border: 0;
            box-sizing: border-box;
            text-align: center;
            width: 96px;
            flex-shrink: 0;
        }

        .b3-button:hover, .b3-button:focus {
            text-decoration: none;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / .3), 0 1px 3px 1px rgb(0 0 0 /.15);
        }

        .b3-button:active {
            box-shadow: 0 2px 3px 1px rgb(0 0 0 / .3), 0 2px 4px 2px rgb(0 0 0 /.15);
        }

        .ws-open {
            width: auto;
            padding: 2px 12px;
            color: rgba(0, 0, 0, .6);
            background-color: transparent;
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 120ms ease;
        }

        .ws-item:hover .ws-open {
            opacity: 1;
            pointer-events: auto;
        }

        .ws-open:hover, .ws-open:focus {
            color: #222;
            background-color: rgba(0, 0, 0, .06);
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .4);
        }

        .ws-open:active {
            box-shadow: inset 0 0 0 0.6px rgba(0, 0, 0, .4);
        }

        .b3-label {
            padding: 16px 24px 0;
            margin-bottom: 16px;
            display: flex;
            text-align: left;
            box-shadow: 0 15px 0 0 #fff, 0 16px 0 0 #e0e0e0;
        }

        .b3-label__text {
            color: rgba(0, 0, 0, .6);
            font-size: 14px;
            margin-top: 4px;
            overflow: hidden;
            line-height: 1.65;
        }

        .fn__flex-center {
            align-self: center;
        }

        .svg {
            position: fixed;
            right: 32px;
            top: 0;
            width: 13px;
            fill: rgba(0, 0, 0, .6);
            padding: 9.5px;
            cursor: pointer;
            z-index: 1;
        }

        .svg:hover {
            background: #dfe0e1;
            fill: #222;
        }

        #close {
            right: 0;
            width: 10px;
            padding: 11px 11px;
        }

        #close:hover {
            background-color: #d23f31;
            fill: #fff;
        }

        a {
            text-decoration: none;
            color: #3575f0;
        }

        a:hover {
            text-decoration: underline;
        }

        .fn__none {
            display: none !important;
        }

        .slogan {
            color: rgba(0, 0, 0, .6);
            font-size: 15px;
        }

        .notice {
            font-size: 14px;
            color: rgba(0, 0, 0, .6);
            text-align: center;
        }

        .missing-tip {
            font-size: 18px;
            color: #222;
            text-align: left;
            padding: 0 24px;
            line-height: 1.6;
        }

        .missing-path {
            font-size: 14px;
            color: rgba(0, 0, 0, .6);
            margin-top: 8px;
            word-break: break-all;
        }

        code {
            word-break: break-all;
        }

        kbd {
            font: 75% SFMono-Regular, Consolas, "Liberation Mono";
            line-height: 1;
            border-radius: 6px;
            padding: 2px 4px;
            color: rgba(0, 0, 0, .6);
            vertical-align: middle;
            background-color: #f6f6f6;
            border: solid 1px #e0e0e0;
            box-shadow: inset 0 -1px 0 #e0e0e0;
        }

        .icon {
            width: 96px;
            margin: 0 auto 16px;
        }

        .feedback {
            display: flex;
            justify-content: space-around;
            font-size: 14px
        }

        .drag {
            -webkit-app-region: drag;
            height: 32px;
            cursor: pointer;
            position: fixed;
            top: 0;
            left: 0;
            right: 64px;
        }

        .darwin #min,
        .darwin #close {
            display: none;
        }

        .darwin .drag {
            right: 0;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1e1e1e;
                color: #dadada;
            }

            .wsPanel {
                background-color: #2c2c2c;
                border-right: 1px solid #363636;
            }

            .wsTitle {
                color: #9aa0a6;
            }

            .ws-item:hover {
                background: rgba(255, 255, 255, .075);
            }

            .ws-name {
                color: #dadada;
            }

            .ws-path {
                color: #9aa0a6;
            }

            .b3-button {
                background-color: #3573f0;
            }

            .b3-button:hover, .b3-button:focus {
                box-shadow: 0 1px 2px 0 rgb(0 0 0 / .3), 0 1px 3px 1px rgb(255 255 255 /.15);
            }

            .b3-button:active {
                box-shadow: 0 2px 3px 1px rgb(0 0 0 / .3), 0 2px 4px 2px rgb(255 255 255 /.15);
            }

            .ws-open {
                color: #9aa0a6;
                background-color: transparent;
                box-shadow: inset 0 0 0 0.6px rgba(255, 255, 255, .25);
            }

            .ws-open:hover, .ws-open:focus {
                color: #dadada;
                background-color: rgba(255, 255, 255, .075);
                box-shadow: inset 0 0 0 0.6px rgba(255, 255, 255, .4);
            }

            .ws-open:active {
                box-shadow: inset 0 0 0 0.6px rgba(255, 255, 255, .4);
            }

            .b3-select {
                color: #dadada;
                box-shadow: inset 0 0 0 0.6px #9aa0a6;
                background: url("data:image/svg+xml;utf8,<svg fill='rgba(154, 160, 166, .68)' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 2px center #1e1e1e;
            }

            .b3-select:focus {
                box-shadow: inset 0 0 0 1px #3573f0, 0 0 0 3px rgba(53, 115, 240, .24);
            }

            .b3-label {
                box-shadow: 0 15px 0 0 #1e1e1e, 0 16px 0 0 #363636;
            }

            .b3-label__text {
                color: #9aa0a6;
            }

            .svg {
                fill: #9aa0a6;
            }

            .svg:hover {
                background: rgba(255, 255, 255, .075);
                fill: #dadada;
            }

            a {
                color: #3573f0;
            }

            .slogan {
                color: #9aa0a6;
            }

            .notice {
                color: #9aa0a6;
            }

            .missing-tip {
                color: #dadada;
            }

            .missing-path {
                color: #9aa0a6;
            }

            kbd {
                color: #9aa0a6;
                background-color: #262626;
                border: solid 1px rgba(230, 230, 230, .06);
                box-shadow: inset 0 -1px 0 rgba(230, 230, 230, .06);
            }
        }
    </style>
</head>
<body>
<div id="layout" class="layout">
    <div class="wsPanel">
        <div class="wsTitle" data-i18n="wsTitle"></div>
        <div class="wsList"></div>
    </div>
    <div class="fn__flex-column right">
        <div class="fn__flex-1"></div>
        <img class="icon">
        <h2 data-i18n="title"></h2>
        <div class="slogan" data-i18n="slogan"></div>
        <div class="fn__flex-1"></div>
        <div class="missing-tip">
            <div data-i18n="missingTip"></div>
            <div class="missing-path"><code class="missing"></code></div>
        </div>
        <div class="fn__flex-1"></div>
        <div class="notice fn__none emptyHint">
            <span data-i18n="emptyHint"></span>
        </div>
        <label class="b3-label">
            <div>
                <span data-i18n="selectPath"></span>
                <div class="b3-label__text" data-i18n="selectPathDesc"></div>
            </div>
            <div class="fn__flex-1"></div>
            <button class="b3-button fn__flex-center choosePath" data-i18n="selectBtn"></button>
        </label>
        <label class="b3-label">
            <div>
                <span data-i18n="lang"></span>
                <div class="b3-label__text" data-i18n-html="langDesc"></div>
            </div>
            <div class="fn__flex-1"></div>
            <select class="b3-select lang">
                <option value="ar">العربية</option>
                <option value="de">Deutsch</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="he">עברית</option>
                <option value="hi">हिन्दी</option>
                <option value="id">Bahasa Indonesia</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="nl">Nederlands</option>
                <option value="pl">Polski</option>
                <option value="pt-BR">Português (Brasil)</option>
                <option value="ru">Русский</option>
                <option value="sk">Slovenčina</option>
                <option value="th">ไทย</option>
                <option value="tr">Türkçe</option>
                <option value="uk">Українська</option>
                <option value="zh-TW">繁體中文</option>
                <option value="zh-CN">简体中文</option>
            </select>
        </label>
        <div class="fn__flex-1"></div>
        <div class="feedback">
            <span>❤️ <a data-i18n-href="feedbackUrl" target="_blank" data-i18n="feedback"></a></span>
            <span>🏘️ <a data-i18n-href="communityUrl" target="_blank" data-i18n="community"></a></span>
            <span>🔖 <a data-i18n-href="downloadUrl" target="_blank" class="version"></a></span>
        </div>
        <div class="fn__flex-1"></div>
    </div>
</div>

    const path = require("path")
    const {ipcRenderer} = require("electron")

    // 渲染可用工作空间列表
    const wsRaw = decodeURIComponent(getSearch("workspaces"))
    const wsList = wsRaw.split("\n").filter(item => "" !== item.trim())
    let langData = applyLang(currentLang, EXTRA_I18N)
    const renderWsList = () => {
        const root = document.querySelector(".wsList")
        root.innerHTML = ""
        wsList.forEach(p => {
            const div = document.createElement("div")
            div.className = "ws-item"
            const text = document.createElement("div")
            text.className = "ws-text"
            const name = document.createElement("div")
            name.className = "ws-name"
            name.textContent = path.basename(p)
            const wsPath = document.createElement("div")
            wsPath.className = "ws-path"
            wsPath.textContent = p
            text.appendChild(name)
            text.appendChild(wsPath)
            const btn = document.createElement("button")
            btn.className = "b3-button ws-open"
            btn.textContent = langData.open
            btn.dataset.path = p
            btn.addEventListener("click", () => {
                ipcRenderer.send("siyuan-select-workspace", {
                    workspace: p,
                    lang: currentLang,
                })
            })
            div.appendChild(text)
            div.appendChild(btn)
            root.appendChild(div)
        })
    }

    const langSelect = document.querySelector(".lang")
    langSelect.value = currentLang
    document.querySelector(".version").textContent = `v${getSearch("v")}`
    document.querySelector(".icon").src = decodeURIComponent(`${getSearch("icon")}`)
    document.querySelector(".missing").textContent = decodeURIComponent(getSearch("missing"))

    langSelect.addEventListener("change", (event) => {
        langData = applyLang(event.target.value, EXTRA_I18N)
        // 重新渲染列表项按钮文案
        renderWsList()
    })

    initWindowChrome()

    if (0 < wsList.length) {
        // 存在可用工作空间时渲染左列列表
        renderWsList()
    } else {
        // 没有可用工作空间时隐藏左列，显示右列空提示
        document.querySelector(".wsPanel").classList.add("fn__none")
        document.querySelector(".emptyHint").classList.remove("fn__none")
    }

    document.querySelector(".choosePath").addEventListener("click", async () => {
        const initPath = await chooseWorkspacePath(langData)
        if (null === initPath) {
            return
        }
        ipcRenderer.send("siyuan-select-workspace", {
            workspace: initPath,
            lang: currentLang,
        })
    })
</script>
